name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  windows-install:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build Windows binary
        run: go build -o airskills.exe .

      - name: Verify binary runs
        run: ./airskills.exe version

      - name: Verify help output
        run: ./airskills.exe --help

      - name: Check agent detection
        shell: pwsh
        run: |
          # Create a fake skill directory to test detection
          $skillDir = "$env:USERPROFILE\.claude\skills\test-skill"
          New-Item -ItemType Directory -Path $skillDir -Force | Out-Null
          Set-Content -Path "$skillDir\SKILL.md" -Value "---`nname: test`n---`nTest skill"

          # Status without login should exit cleanly (not crash)
          $output = ./airskills.exe version 2>&1 | Out-String
          if ($output -notmatch "airskills") {
            Write-Error "version command failed: $output"
            exit 1
          }
          Write-Host "Windows binary: OK"

  notify-failure:
    runs-on: ubuntu-latest
    needs: [test, windows-install]
    if: failure()
    steps:
      - name: Send Telegram notification
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=HTML \
            -d text="<b>airskills CLI CI failed</b>%0A%0ACommit: <code>${{ github.event.head_commit.message }}</code>%0A%0A<a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>View run</a>"
